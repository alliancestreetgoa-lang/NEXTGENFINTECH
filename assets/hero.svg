<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" role="img" aria-label="Business growth illustration">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14275f"/><stop offset="1" stop-color="#2f6fd6"/>
    </linearGradient>
    <linearGradient id="hbar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#5fd0f7"/><stop offset="1" stop-color="#a5f3fc"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1100" fill="url(#hg)"/>
  <g fill="#ffffff" opacity="0.07">
    <circle cx="720" cy="220" r="260"/><circle cx="160" cy="920" r="200"/>
  </g>
  <!-- rising bar chart -->
  <g transform="translate(250 360)">
    <rect x="0"   y="300" width="80" height="140" rx="10" fill="#ffffff" opacity="0.85"/>
    <rect x="120" y="210" width="80" height="230" rx="10" fill="#ffffff" opacity="0.9"/>
    <rect x="240" y="120" width="80" height="320" rx="10" fill="url(#hbar)"/>
    <rect x="360" y="40"  width="80" height="400" rx="10" fill="url(#hbar)"/>
    <!-- upward arrow -->
    <path d="M20 360 L180 250 L300 290 L430 70" fill="none" stroke="#a5f3fc" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M390 60 L450 50 L440 110 Z" fill="#a5f3fc"/>
  </g>
  <text x="450" y="900" text-anchor="middle" font-family="'Poppins','Segoe UI',sans-serif" font-weight="800" font-size="64" fill="#ffffff">NextGen FinTech</text>
  <text x="450" y="960" text-anchor="middle" font-family="'Inter',sans-serif" font-size="34" fill="#cdd9f5">Financial &amp; Business Advisory</text>
</svg>
