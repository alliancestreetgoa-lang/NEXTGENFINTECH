<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="NextGen FinTech monogram">
  <defs>
    <linearGradient id="mBlue" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset=".55" stop-color="#2f6fd6"/>
      <stop offset="1" stop-color="#5fd0f7"/>
    </linearGradient>
    <linearGradient id="mStone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b7480"/>
      <stop offset=".5" stop-color="#333b46"/>
      <stop offset="1" stop-color="#1b2230"/>
    </linearGradient>
    <linearGradient id="mArrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3aa0e8"/>
      <stop offset="1" stop-color="#7fe0ff"/>
    </linearGradient>
  </defs>

  <!-- Left stem of the N (textured stone) -->
  <rect x="24" y="30" width="15" height="62" rx="7" fill="url(#mStone)"/>

  <!-- Diagonal of the N (blue gradient) -->
  <path d="M31 35 L83 90" fill="none" stroke="url(#mBlue)" stroke-width="15" stroke-linecap="round"/>

  <!-- Right stem rising up into the arrow -->
  <rect x="76" y="36" width="15" height="56" rx="7" fill="url(#mBlue)"/>

  <!-- Up-arrow head on top of the right stem -->
  <path d="M83.5 14 L100 40 L67 40 Z" fill="url(#mArrow)"/>

  <!-- Blue swoosh underline -->
  <path d="M18 96 Q58 120 102 82" fill="none" stroke="url(#mBlue)" stroke-width="10" stroke-linecap="round"/>
</svg>
